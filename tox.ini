[tox]
minversion = 4.0
envlist = py39,py311,pep8,cover
skipsdist = False

[testenv]
usedevelop = True
deps =
    -r{toxinidir}/requirements.txt
    -r{toxinidir}/test-requirements.txt
commands =
    pytest {posargs:tests/unit} -v

[testenv:py39]
basepython = python3.9
deps =
    -r{toxinidir}/requirements.txt
    -r{toxinidir}/test-requirements.txt
commands =
    pytest {posargs:tests/unit} -v

[testenv:py311]
basepython = python3.11
deps =
    -r{toxinidir}/requirements.txt
    -r{toxinidir}/test-requirements.txt
commands =
    pytest {posargs:tests/unit} -v

[testenv:pep8]
deps =
    hacking>=6.0.0
    flake8>=6.0.0
    pycodestyle>=2.10.0
commands =
    flake8 {posargs:manila/share/drivers/weka tests}

[testenv:cover]
deps =
    -r{toxinidir}/requirements.txt
    -r{toxinidir}/test-requirements.txt
commands =
    pytest --cov=manila --cov-report=term-missing \
           --cov-report=html:cover \
           {posargs:tests/unit}

[testenv:venv]
commands = {posargs}

[flake8]
show-source = True
enable-extensions = H301,H306,H401,H403,H904
max-line-length = 79
exclude =
    .venv,
    .git,
    .tox,
    dist,
    doc,
    *egg,
    build,
    *.pyc

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
