[tox]
minversion = 4.0
envlist = py39,py311,pep8,cover
skipsdist = True

[testenv]
usedevelop = False
setenv =
    PYTHONPATH = {toxinidir}/stubs:{toxinidir}
deps =
    -r{toxinidir}/test-requirements.txt
commands =
    pytest {posargs:tests/unit} -v

[testenv:py39]
basepython = python3.9

[testenv:py311]
basepython = python3.11

[testenv:pep8]
deps =
    hacking>=6.0.0
    flake8>=6.0.0
    pycodestyle>=2.10.0
commands =
    flake8 {posargs:manila/share/drivers/weka tests}

[testenv:cover]
commands =
    pytest --cov=manila --cov-report=term-missing \
           --cov-report=html:cover \
           {posargs:tests/unit}

[testenv:venv]
commands = {posargs}

[flake8]
show-source = True
enable-extensions = H301,H306,H401,H403,H904
max-line-length = 79
exclude =
    .venv,
    .git,
    .tox,
    dist,
    doc,
    *egg,
    build,
    stubs,
    *.pyc
